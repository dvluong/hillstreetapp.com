<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hill Street Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container { max-width: 480px; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; color: #6e6e73; margin-bottom: 1.5rem; }
        .badge a { display: inline-block; }
        .badge img { height: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hill Street Pro</h1>
        <p>Available on the App Store</p>
        <div class="badge">
            <a href="https://apps.apple.com/us/app/hill-street-pro/id6760046997">
                <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
            </a>
        </div>
    </div>
</body>
</html>
